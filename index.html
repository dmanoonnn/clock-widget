<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
.clock-widget {
  width: 90%;
  height: 85%;
  background: #FFFAF5;
  border: 1.5px solid #E8D8CC;
  border-radius: 28px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.04);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
.clock-widget::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(210,190,170,0.15) 1px, transparent 1px);
  background-size: 14px 14px;
  pointer-events: none;
}
.sticker { position: absolute; top: 12px; right: 14px; font-size: 18px; opacity: 0.18; }
.time { 
  font-family: 'Caveat', cursive; 
  font-size: 13vw;
  line-height: 1; 
  color: #705747;
  position: relative;
  z-index: 1;
}
.seconds { 
  font-size: 6vw;
  color: #F3A2C5; 
  margin-left: 4px; 
}
.date { 
  margin-top: 6px; 
  font-family: 'Special Elite', monospace; 
  font-size: 2.5vw;
  color: #9A8476; 
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
<div class="clock-widget">
  <div class="sticker">🕰️</div>
  <div class="time">
    <span id="hours"></span>:<span id="minutes"></span><span class="seconds" id="seconds"></span>
  </div>
  <div class="date" id="date"></div>
</div>
<script>
const days = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
function updateClock() {
  const now = new Date();
  document.getElementById("hours").textContent = String(now.getHours()).padStart(2,"0");
  document.getElementById("minutes").textContent = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("seconds").textContent = String(now.getSeconds()).padStart(2,"0");
  document.getElementById("date").textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
